name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            family: apt
          - distro: ubuntu-22.04
            image: ubuntu:22.04
            family: apt
          - distro: debian-bookworm
            image: debian:bookworm
            family: apt
          - distro: debian-trixie
            image: debian:trixie
            family: apt
          - distro: fedora-latest
            image: fedora:latest
            family: dnf
          - distro: archlinux
            image: archlinux:latest
            family: pacman
    container:
      image: ${{ matrix.image }}
      options: --privileged --cap-add SYS_ADMIN --cap-add SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Install system dependencies
        run: |
          if [ "${{ matrix.family }}" = "apt" ]; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              clang \
              curl \
              git \
              libclang-dev \
              make \
              pkg-config \
              procps \
              python3
          elif [ "${{ matrix.family }}" = "dnf" ]; then
            dnf install -y \
              ca-certificates \
              clang \
              clang-devel \
              curl \
              gcc \
              gcc-c++ \
              git \
              make \
              pkgconf-pkg-config \
              procps-ng \
              python3
          else
            pacman -Syu --noconfirm --needed \
              base-devel \
              ca-certificates \
              clang \
              curl \
              git \
              make \
              pkgconf \
              procps-ng \
              python
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Relax perf restrictions when possible
        run: sysctl -w kernel.perf_event_paranoid=-1 || true

      - name: Test
        env:
          STACKPULSE_REQUIRE_PYTHON_PERF: "1"
        run: make ci

      - name: Doc tests
        run: cargo test --doc

      - name: Package dry run
        if: matrix.distro == 'ubuntu-24.04'
        run: cargo publish --dry-run --allow-dirty
